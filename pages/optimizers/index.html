<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Optimizer Comparison">
  <meta property="og:description" content="Interactive 2D visualization of gradient descent optimizers (GD, SGD, Momentum, AdaGrad, RMSProp, Adam, AdamW) racing on different loss surfaces.">
  <meta property="og:url" content="https://emmaleonhart.com/optimizers/">
  <title>Optimizer Comparison</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #0a0a0f; color: #d0d0dc; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 24px; }
    .container { max-width: 960px; width: 100%; }
    .back { display: inline-block; color: #7c8cf8; text-decoration: none; font-size: 0.9rem; margin-bottom: 24px; }
    .back:hover { text-decoration: underline; }
    h1 { font-size: 1.6rem; font-weight: 700; color: #e8e8f0; margin-bottom: 8px; letter-spacing: -0.3px; }
    .subtitle { color: #8888a0; font-size: 0.95rem; margin-bottom: 20px; line-height: 1.5; }
    .canvas-wrap { width: 100%; border: 1px solid #1e1e2a; border-radius: 8px; overflow: hidden; margin-bottom: 16px; background: #0a0a0f; }
    canvas { display: block; width: 100%; touch-action: none; }
    .controls { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
    .ctrl-btn { padding: 6px 14px; background: #12121a; border: 2px solid #1e1e2a; border-radius: 8px; color: #b0b0cc; font-family: 'Segoe UI', system-ui, sans-serif; font-size: 0.8rem; cursor: pointer; transition: all 0.15s; }
    .ctrl-btn:hover { border-color: #3a3a50; background: #16161f; }
    .ctrl-btn.active { border-color: #7c8cf8; background: rgba(124, 140, 248, 0.1); color: #e8e8f0; }
    .opt-btn { padding: 6px 14px; background: #12121a; border: 2px solid #1e1e2a; border-radius: 8px; font-family: 'Segoe UI', system-ui, sans-serif; font-size: 0.8rem; cursor: pointer; transition: all 0.15s; }
    .opt-btn:hover { border-color: #3a3a50; background: #16161f; }
    .opt-btn.active { border-color: var(--opt-color, #7c8cf8); background: rgba(124, 140, 248, 0.08); color: #e8e8f0; }
    .ctrl-sep { width: 1px; background: #1e1e2a; align-self: stretch; margin: 0 4px; }
    .slider-group { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; color: #9898ac; }
    .slider-group input { width: 80px; accent-color: #7c8cf8; }
    .slider-group span { font-family: 'Cascadia Code', monospace; width: 40px; }
    .info-row { display: flex; gap: 14px; align-items: flex-start; }
    .info-panel { flex: 1; background: #12121a; border: 1px solid #1e1e2a; border-radius: 8px; padding: 14px; min-width: 0; }
    .section-label { font-size: 0.65rem; color: #666880; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
    #info-panel { font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 0.78rem; color: #9898ac; line-height: 1.8; }
    #insight-box { padding: 10px 12px; background: rgba(124, 140, 248, 0.04); border-left: 3px solid #7c8cf8; border-radius: 0 6px 6px 0; font-size: 0.82rem; line-height: 1.5; color: #9898ac; }
    @media (max-width: 700px) { .info-row { flex-direction: column; } }
    @media (max-width: 480px) { body { padding: 24px 12px; } h1 { font-size: 1.3rem; } .controls { gap: 5px; } }
  </style>
</head>
<body>
  <div class="container">
    <a class="back" href="/">&larr; Home</a>
    <h1>Optimizer Comparison</h1>
    <p class="subtitle">Watch seven optimizers race across a loss surface. Each uses a different strategy to find the minimum. Toggle optimizers and surfaces to compare their behavior.</p>
    <div class="controls">
      <button class="ctrl-btn active" data-surface="bowl">Bowl</button>
      <button class="ctrl-btn" data-surface="valley">Valley</button>
      <button class="ctrl-btn" data-surface="saddle">Saddle</button>
      <button class="ctrl-btn" data-surface="beale">Beale</button>
      <div class="ctrl-sep"></div>
      <button class="ctrl-btn" id="btn-play">Play</button>
      <button class="ctrl-btn" id="btn-reset">Reset</button>
    </div>
    <div class="controls">
      <button class="opt-btn active" data-opt="gd" style="--opt-color:#7c8cf8; color:#7c8cf8">GD</button>
      <button class="opt-btn active" data-opt="sgd" style="--opt-color:#38bdf8; color:#38bdf8">SGD</button>
      <button class="opt-btn active" data-opt="momentum" style="--opt-color:#a78bfa; color:#a78bfa">Momentum</button>
      <button class="opt-btn active" data-opt="adagrad" style="--opt-color:#f59e0b; color:#f59e0b">AdaGrad</button>
      <button class="opt-btn active" data-opt="rmsprop" style="--opt-color:#f43f5e; color:#f43f5e">RMSProp</button>
      <button class="opt-btn active" data-opt="adam" style="--opt-color:#34d399; color:#34d399">Adam</button>
      <button class="opt-btn active" data-opt="adamw" style="--opt-color:#fb923c; color:#fb923c">AdamW</button>
      <div class="ctrl-sep"></div>
      <div class="slider-group">LR: <input type="range" id="lr-slider" min="0.001" max="0.5" step="0.001" value="0.05"> <span id="lr-val">0.050</span></div>
      <div class="slider-group">Speed: <input type="range" id="speed-slider" min="1" max="10" step="1" value="3"> </div>
    </div>
    <div class="canvas-wrap"><canvas id="canvas"></canvas></div>
    <div class="info-row">
      <div class="info-panel">
        <div class="section-label">Optimizer Status</div>
        <div id="info-panel"></div>
      </div>
      <div class="info-panel">
        <div id="insight-box"></div>
      </div>
    </div>
  </div>
  <script type="module" src="main.js"></script>
</body>
</html>
